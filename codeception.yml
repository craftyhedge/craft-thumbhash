actor: Tester
paths:
  tests: tests
  log: tests/_output
  output: tests/_output
  data: tests/_data
  support: tests/_support
  envs: tests/_envs
bootstrap: _bootstrap.php
params:
  - env
  - tests/.env
modules:
  config:
    \craft\test\Craft:
      configFile: 'tests/_craft/config/test.php'
      entryUrl: 'http://test.craftcms.test/index.php'
      projectConfig: {}
      migrations: []
      plugins:
        thumbhash:
          class: '\craftyhedge\craftthumbhash\Plugin'
          handle: thumbhash
      cleanup: true
      transaction: true
      dbSetup: {clean: true, setupCraft: true}
      fullMock: false
